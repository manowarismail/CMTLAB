[DEFAULT]
ConnectionType=acceptor
StartTime=00:00:00
EndTime=23:59:59
UseDataDictionary=Y
FileStorePath=store
FileLogPath=log
# Dev/lab: reset seq nums on each logon so client/server stay aligned (avoids "expecting 356 but received 358").
ResetOnLogon=Y
ResetOnDisconnect=Y
# Dev only: MINIFIX often does not answer ResendRequest; strict validation leaves you stuck at "expecting 356".
# Do not use in production.
ValidateSequenceNumbers=N
SendRedundantResendRequests=Y

[SESSION]
BeginString=FIX.4.2
SenderCompID=EXEC_SERVER
TargetCompID=MINIFIX_CLIENT
SocketAcceptPort=9876
